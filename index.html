<!DOCTYPE html>
<html lang="pt-br">

            </div>

        </div>

        <div class="batata">
            <div class="vida">

            </div>
        </div>

        <div class="status">

                <p>"Saber tudo é perder tudo"</p>

            </div>

        </div>

        <div class="area-botao">

        </div> 

        <div class="botao-card">

            <button class="curar">
                <p>curar</p>

                <p>Subir NEX</p>
            </button>


        </div>

        <div class="acao-status">
            <p>A Missão de Beatrice começou</p>
            <p style="color: red;">Beatrice tomou ?? de dano e se tornou Inexistida</p>
